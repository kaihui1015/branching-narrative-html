<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Story Cards — Template</title>
<style>
  :root {
    --bg: #fafaf7;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --card: #ffffff;
    --border: #e6e4de;
    --accent: #f2efe8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111112;
      --fg: #f2f2f0;
      --muted: #9a9a95;
      --card: #1c1c1e;
      --border: #2a2a2c;
      --accent: #232326;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .serif { font-family: "Iowan Old Style", "Palatino", Georgia, serif; }
  header {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.5rem 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 0.9rem; margin: 0; }
  header p { font-size: 0.75rem; color: var(--muted); margin: 0.25rem 0 0; }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
    min-height: 70vh;
  }
  .prompt {
    text-align: center;
    font-size: 1.35rem;
    line-height: 1.6;
  }
  .grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    perspective: 1400px;
    min-height: 280px;
  }
  .card-wrap {
    width: 160px;
    height: 240px;
    transition: transform 0.5s ease, opacity 0.4s ease;
  }
  .card-wrap.chosen { z-index: 2; width: min(520px, 90vw); height: auto; min-height: 240px; }
  .card-wrap.dismissed { opacity: 0; pointer-events: none; }
  @media (max-width: 640px) {
    .grid { flex-direction: column; }
    .card-wrap { width: min(320px, 85vw); height: 140px; transform: none !important; }
  }
  .card {
    width: 100%; height: 100%;
    background: transparent; border: 0; padding: 0;
    cursor: pointer; text-align: left;
    font: inherit; color: inherit;
  }
  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1);
    transform-style: preserve-3d;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 0.75rem;
    padding: 1rem;
    display: flex; flex-direction: column;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .back { transform: rotateY(180deg); justify-content: center; overflow-y: auto; }
  .card:hover .card-inner:not(.flipped) { transform: translateY(-4px); }
  .label { font-size: 1.05rem; font-weight: 500; margin-top: auto; }
  .hint { font-size: 0.7rem; color: var(--muted); margin-top: 0.5rem; }
  .badge { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); }
  .reveal { font-size: 0.95rem; line-height: 1.6; margin: 0; }
  .caret { display: inline-block; width: 2px; height: 1em; vertical-align: -0.15em; background: currentColor; animation: blink 1s steps(1) infinite; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }
  .final {
    text-align: center;
    font-size: 1.4rem;
    line-height: 1.6;
    max-width: 34rem;
    margin: auto;
    animation: fade 0.5s ease;
  }
  .final .badge { display: block; margin-bottom: 1rem; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .controls {
    display: flex; justify-content: center; gap: 0.5rem; margin-top: auto;
  }
  .controls button {
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    padding: 0.4rem 0.75rem;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .controls button:hover:not(:disabled) { background: var(--accent); }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .fade-in { animation: fade 0.4s ease; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Interactive Story Cards</h1>
    <p>Standalone template — edit the STORY constant below</p>
  </div>
</header>

<main>
  <div id="stage"></div>
  <div class="controls">
    <button id="btn-back">Back</button>
    <button id="btn-restart">Restart</button>
  </div>
</main>

<script>
/* ============================================================
   STORY DATA — edit this to author your own branching narrative
   ============================================================
   Scene shape:
     { prompt, cards: [{ label, reveal, next, if?, set? }] }
     { final }  -> ending scene
   `if`: expression over vars, e.g. "mood >= 1"
   `set`: object merged into vars when this card is chosen
*/
const STORY = {
  id: "sample",
  start: "s1",
  vars: { mood: 0 },
  scenes: {
    s1: {
      prompt: "You stand at a crossroads at dusk. What draws your eye?",
      cards: [
        { label: "The lantern",  reveal: "You lift the lantern from its hook. Warm light pools around your boots, and the road ahead sheds its shadows one step at a time.", next: "s2", set: { mood: 1 } },
        { label: "The letter",   reveal: "The paper is folded once, sealed with wax. The ink is still wet — someone left it for you moments ago.", next: "s2" },
        { label: "The key",      reveal: "Cold iron, heavier than it should be. It fits no lock you have seen, but your fingers know its shape.", next: "s2" },
        { label: "The mirror",   reveal: "Your reflection blinks a half-second late. When you smile, it hesitates before smiling back.", next: "s2" },
        { label: "The silence",  reveal: "You choose to listen instead of look. Something in the dark listens with you, patient and unhurried.", next: "s2" },
      ],
    },
    s2: {
      prompt: "A door appears at the edge of the clearing. How do you approach it?",
      cards: [
        { label: "Knock softly", reveal: "Three quiet raps. The door opens on its own, revealing a room that recognizes you.", next: "end" },
        { label: "Listen first", reveal: "Footsteps inside, then quiet. You wait until the quiet feels like an invitation.", next: "end" },
        { label: "Step through", reveal: "You do not hesitate. The doorway breathes you in and gives you back to yourself, changed.", next: "end", if: "mood >= 1" },
      ],
    },
    end: {
      final: "The story remembers the shape you gave it. Somewhere, a lantern is still burning for you. Thank you for playing.",
    },
  },
};

/* ============================================================
   ENGINE
   ============================================================ */
const KEY = "story:" + STORY.id;

function initialState() {
  return { sceneId: STORY.start, vars: { ...(STORY.vars || {}) }, history: [] };
}
function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!STORY.scenes[s.sceneId]) return null;
    return s;
  } catch { return null; }
}
function saveState(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {} }
function clearSaved() { try { localStorage.removeItem(KEY); } catch {} }

// tiny safe expression evaluator: identifiers, numbers, strings, bools,
// == != > < >= <=, && || !, parens
function tokenize(src) {
  const t = []; let i = 0;
  while (i < src.length) {
    const c = src[i];
    if (c === " " || c === "\t") { i++; continue; }
    if (c === "(") { t.push({t:"lp"}); i++; continue; }
    if (c === ")") { t.push({t:"rp"}); i++; continue; }
    if (c === "!" && src[i+1] !== "=") { t.push({t:"op",v:"!"}); i++; continue; }
    const two = src.slice(i, i+2);
    if (["==","!=",">=","<=","&&","||"].includes(two)) { t.push({t:"op",v:two}); i+=2; continue; }
    if (c === ">" || c === "<") { t.push({t:"op",v:c}); i++; continue; }
    if (c === '"' || c === "'") {
      let j = i+1; while (j < src.length && src[j] !== c) j++;
      t.push({t:"str",v:src.slice(i+1,j)}); i = j+1; continue;
    }
    if (/[0-9]/.test(c)) {
      let j = i; while (j < src.length && /[0-9.]/.test(src[j])) j++;
      t.push({t:"num",v:Number(src.slice(i,j))}); i = j; continue;
    }
    if (/[A-Za-z_]/.test(c)) {
      let j = i; while (j < src.length && /[A-Za-z0-9_]/.test(src[j])) j++;
      const w = src.slice(i,j);
      if (w === "true") t.push({t:"bool",v:true});
      else if (w === "false") t.push({t:"bool",v:false});
      else t.push({t:"id",v:w});
      i = j; continue;
    }
    throw new Error("bad char: " + c);
  }
  return t;
}
function evalCond(expr, vars) {
  const toks = tokenize(expr); let p = 0;
  const peek = () => toks[p], eat = () => toks[p++], B = v => Boolean(v);
  function atom() {
    const t = eat(); if (!t) throw 0;
    if (t.t === "num" || t.t === "str" || t.t === "bool") return t.v;
    if (t.t === "id") return vars[t.v];
    if (t.t === "lp") { const v = or(); if (eat().t !== "rp") throw 0; return v; }
    if (t.t === "op" && t.v === "!") return !B(atom());
    throw 0;
  }
  function cmp() {
    const l = atom(); const t = peek();
    if (t && t.t === "op" && ["==","!=",">","<",">=","<="].includes(t.v)) {
      eat(); const r = atom();
      switch (t.v) { case "==": return l===r; case "!=": return l!==r;
        case ">": return l>r; case "<": return l<r; case ">=": return l>=r; case "<=": return l<=r; }
    }
    return l;
  }
  function and() { let l = cmp(); while (peek() && peek().t==="op" && peek().v==="&&") { eat(); l = B(l) && B(cmp()); } return l; }
  function or()  { let l = and(); while (peek() && peek().t==="op" && peek().v==="||") { eat(); l = B(l) || B(and()); } return l; }
  return B(or());
}
function visibleCards(scene, vars) {
  if (!scene.cards) return [];
  return scene.cards.filter(c => !c.if || (() => { try { return evalCond(c.if, vars); } catch { return false; } })());
}

/* ============================================================
   RENDER
   ============================================================ */
let state = loadState() || initialState();
let chosenIndex = null;

const stage = document.getElementById("stage");
const btnBack = document.getElementById("btn-back");
const btnRestart = document.getElementById("btn-restart");

btnBack.addEventListener("click", () => {
  if (state.history.length === 0 || chosenIndex !== null) return;
  const prev = state.history[state.history.length - 1];
  state = { sceneId: prev.sceneId, vars: prev.vars, history: state.history.slice(0,-1) };
  chosenIndex = null;
  saveState(state); render();
});
btnRestart.addEventListener("click", () => {
  clearSaved(); state = initialState(); chosenIndex = null; render();
});

function typeInto(el, text) {
  el.textContent = "";
  const caret = document.createElement("span"); caret.className = "caret"; el.after(caret);
  let i = 0, last = performance.now(), cancelled = false;
  function step(now) {
    if (cancelled) return;
    const dt = now - last;
    if (dt > 18) {
      i = Math.min(i + Math.max(1, Math.floor(dt/18)), text.length);
      el.textContent = text.slice(0, i);
      last = now;
    }
    if (i < text.length) requestAnimationFrame(step);
    else caret.remove();
  }
  requestAnimationFrame(step);
  return { skip: () => { cancelled = true; el.textContent = text; caret.remove(); } };
}

function render() {
  const scene = STORY.scenes[state.sceneId];
  stage.innerHTML = "";
  const isEnd = !scene.cards || scene.cards.length === 0 || scene.final;

  if (isEnd) {
    const d = document.createElement("div");
    d.className = "final serif";
    d.innerHTML = '<span class="badge">The end</span>';
    const p = document.createElement("p"); p.style.margin = 0;
    d.appendChild(p);
    stage.appendChild(d);
    typeInto(p, scene.final || "The story ends here.");
    updateControls();
    return;
  }

  const wrap = document.createElement("div"); wrap.className = "fade-in";
  const prompt = document.createElement("p");
  prompt.className = "prompt serif";
  prompt.textContent = scene.prompt || "";
  wrap.appendChild(prompt);

  const grid = document.createElement("div"); grid.className = "grid";
  const cards = visibleCards(scene, state.vars);
  const mid = (cards.length - 1) / 2;

  cards.forEach((c, i) => {
    const cw = document.createElement("div"); cw.className = "card-wrap";
    const offset = i - mid;
    cw.style.transform = `translate(${offset*8}px, ${Math.abs(offset)*6}px) rotate(${offset*4}deg)`;

    const btn = document.createElement("button"); btn.className = "card"; btn.type = "button";
    const inner = document.createElement("div"); inner.className = "card-inner";
    const front = document.createElement("div"); front.className = "face front";
    front.innerHTML = `<div class="badge">Card ${i+1}</div><div class="label">${escapeHtml(c.label)}</div><div class="hint">Tap to reveal</div>`;
    const back = document.createElement("div"); back.className = "face back";
    const rp = document.createElement("p"); rp.className = "reveal serif";
    back.appendChild(rp);
    inner.appendChild(front); inner.appendChild(back);
    btn.appendChild(inner); cw.appendChild(btn); grid.appendChild(cw);

    let typer = null;
    btn.addEventListener("click", () => {
      if (chosenIndex !== null) {
        if (chosenIndex === i && typer) typer.skip();
        return;
      }
      chosenIndex = i;
      // dismiss others, flip chosen
      Array.from(grid.children).forEach((el, j) => {
        if (j !== i) el.classList.add("dismissed");
        else { el.classList.add("chosen"); el.style.transform = "translate(0,0) rotate(0) scale(1.02)"; }
      });
      inner.classList.add("flipped");
      setTimeout(() => { typer = typeInto(rp, c.reveal); }, 500);
      updateControls();
      // Advance after the reader has time
      setTimeout(() => {
        const nextVars = { ...state.vars, ...(c.set || {}) };
        state = {
          sceneId: c.next,
          vars: nextVars,
          history: [...state.history, { sceneId: state.sceneId, vars: state.vars }],
        };
        chosenIndex = null;
        saveState(state);
        render();
      }, 3600);
    });
  });

  wrap.appendChild(grid);
  stage.appendChild(wrap);
  updateControls();
}

function updateControls() {
  btnBack.disabled = state.history.length === 0 || chosenIndex !== null;
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

render();
</script>
</body>
</html>
